<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Homebuzz — Architecture Map</title>
<style>
  :root {
    --bg: #0b0f17;
    --panel: #131a26;
    --panel-2: #0f1622;
    --border: #243042;
    --text: #e6edf6;
    --muted: #8a98ad;
    --rail: 320px;
    --edge: #2c3a4f;
    --edge-strong: #fde68a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  header.top {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
    background: linear-gradient(180deg, #101826, #0b0f17);
  }
  header.top h1 { font-size: 18px; margin: 0; letter-spacing: .2px; }
  header.top .desc { color: var(--muted); font-size: 12.5px; max-width: 720px; }
  .layout { flex: 1; display: flex; min-height: 0; }

  /* Side rail */
  aside.rail {
    width: var(--rail); flex: none; border-right: 1px solid var(--border);
    background: var(--panel-2); display: flex; flex-direction: column; min-height: 0;
  }
  .rail h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin: 16px 16px 8px; flex: none; }
  #flows { overflow-y: auto; padding: 0 12px 12px; flex: 1 1 0; min-height: 96px; }
  .flow {
    padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 8px; cursor: pointer; background: var(--panel); transition: border-color .15s, background .15s;
  }
  .flow:hover { border-color: #3a4b66; }
  .flow.active { border-color: var(--edge-strong); background: #1b2336; box-shadow: 0 0 0 1px rgba(253,230,138,.25) inset; }
  .flow .name { font-weight: 650; font-size: 13.5px; }
  .flow .fdesc { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .controls { padding: 12px 16px; border-top: 1px solid var(--border); flex: none; }
  button.reset {
    width: 100%; padding: 9px 12px; border-radius: 9px; cursor: pointer;
    background: #1b2336; color: var(--text); border: 1px solid var(--border); font-weight: 600;
  }
  button.reset:hover { border-color: #3a4b66; }

  /* Steps panel */
  #steps-host { flex: 1 1 0; min-height: 0; flex-direction: column; border-top: 1px solid var(--border); }
  #steps-host .steps-scroll { flex: 1 1 0; min-height: 0; }
  .steps-wrap { margin-top: 8px; }
  ol.steps { list-style: none; margin: 0; padding: 0 4px; }
  ol.steps li { display: flex; gap: 9px; padding: 7px 0; border-bottom: 1px solid #1b2433; }
  ol.steps li:last-child { border-bottom: 0; }
  .stepnum {
    flex: none; width: 20px; height: 20px; border-radius: 50%; background: var(--edge-strong); color: #2a1c00;
    font-size: 11px; font-weight: 800; display: grid; place-items: center; margin-top: 1px;
  }
  .steptext .route { font-size: 11px; color: var(--muted); }
  .steptext .route b { color: var(--text); font-weight: 600; }
  .steptext .lbl { font-size: 12.5px; }
  .steptext .det { font-size: 11.5px; color: var(--muted); margin-top: 1px; }

  /* Canvas / columns */
  .canvas { position: relative; flex: 1; overflow: auto; min-width: 0; }
  #board {
    position: relative; display: flex; gap: 30px; padding: 24px 30px 60px; min-width: max-content; align-items: flex-start;
  }
  svg.overlay { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; z-index: 5; }
  .column { flex: none; width: 210px; }
  .column h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: .1em; margin: 0 0 10px;
    display: flex; align-items: center; gap: 8px; color: var(--muted);
  }
  .dot { width: 10px; height: 10px; border-radius: 3px; flex: none; }
  .node {
    position: relative; border: 1px solid var(--border); border-left-width: 4px; border-radius: 10px;
    background: var(--panel); padding: 9px 11px; margin-bottom: 12px; transition: opacity .18s, box-shadow .18s, border-color .18s, transform .18s;
  }
  .node .nlabel { font-weight: 650; font-size: 13px; }
  .node .npath { font-size: 11px; color: #7fd1ff; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; margin-top: 3px; word-break: break-all; }
  .node .ndetail { font-size: 11.5px; color: var(--muted); margin-top: 4px; }
  .node.badge::after {
    content: attr(data-badge); position: absolute; top: -9px; right: -9px;
    width: 20px; height: 20px; border-radius: 50%; background: var(--edge-strong); color: #2a1c00;
    font-size: 11px; font-weight: 800; display: grid; place-items: center; box-shadow: 0 0 0 2px var(--bg);
  }
  /* dimming when a flow is active */
  body.flow-active .node { opacity: .28; }
  body.flow-active .node.in-flow { opacity: 1; box-shadow: 0 0 0 1px var(--edge-strong), 0 6px 20px rgba(0,0,0,.4); }
  body.flow-active .column h3 { opacity: .5; }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-left: auto; }
  .legend .item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--muted); }
  .meta { font-size: 11px; color: var(--muted); margin: 10px 16px 14px; border-top: 1px solid var(--border); padding-top: 10px; flex: none; max-height: 22vh; overflow-y: auto; }
  .meta code { color: #7fd1ff; }
</style>
</head>
<body>
  <header class="top">
    <h1 id="title"></h1>
    <span class="desc" id="desc"></span>
    <div class="legend" id="legend"></div>
  </header>

  <div class="layout">
    <aside class="rail">
      <h2>Flows</h2>
      <div id="flows"></div>
      <div class="steps-wrap" id="steps-host" style="display:none">
        <h2>Steps</h2>
        <div class="steps-scroll" style="overflow-y:auto; padding-bottom:8px">
          <ol class="steps" id="steps"></ol>
        </div>
      </div>
      <div class="controls">
        <button class="reset" id="reset">Clear selection</button>
      </div>
      <div class="meta" id="meta"></div>
    </aside>

    <div class="canvas" id="canvas">
      <div id="board">
        <svg class="overlay" id="overlay"></svg>
      </div>
    </div>
  </div>

<script>
const SVGNS = "http://www.w3.org/2000/svg";
let DATA = null, nodeById = {}, catById = {}, nodeEls = {}, activeFlow = null, overlay = null;

function el(tag, attrs, txt) {
  const n = document.createElement(tag);
  if (attrs) for (const k in attrs) n.setAttribute(k, attrs[k]);
  if (txt != null) n.textContent = txt;
  return n;
}
function svg(tag, attrs) {
  const n = document.createElementNS(SVGNS, tag);
  if (attrs) for (const k in attrs) n.setAttribute(k, attrs[k]);
  return n;
}

function catColor(nodeId) {
  const n = nodeById[nodeId];
  const c = n && catById[n.category];
  return (c && c.color) || "#fde68a";
}

function init() {
  nodeById = Object.fromEntries(DATA.nodes.map(n => [n.id, n]));
  catById = Object.fromEntries(DATA.categories.map(c => [c.id, c]));
  overlay = document.getElementById("overlay");

// ---- header ----
document.getElementById("title").textContent = DATA.name + " — Architecture Map";
document.getElementById("desc").textContent = DATA.description;
const legend = document.getElementById("legend");
DATA.categories.forEach(c => {
  const item = el("span", { class: "item" });
  const dot = el("span", { class: "dot" }); dot.style.background = c.color;
  item.appendChild(dot); item.appendChild(document.createTextNode(c.label));
  legend.appendChild(item);
});
const m = DATA.meta || {};
const meta = document.getElementById("meta");
meta.appendChild(document.createTextNode("Generated " + (m.generatedAt||"?") + " · commit "));
const code = el("code", null, m.sourceCommit || "?"); meta.appendChild(code);
if (m.notes) { meta.appendChild(el("br")); const s = el("span", null, m.notes); s.style.opacity=".85"; meta.appendChild(s); }

// ---- columns ----
const board = document.getElementById("board");
DATA.categories.forEach(cat => {
  const inCat = DATA.nodes.filter(n => n.category === cat.id);
  if (inCat.length === 0) return; // drop empty category column
  const col = el("div", { class: "column" });
  const h = el("h3");
  const dot = el("span", { class: "dot" }); dot.style.background = cat.color;
  h.appendChild(dot); h.appendChild(document.createTextNode(cat.label));
  col.appendChild(h);
  inCat.forEach(n => {
    const box = el("div", { class: "node", id: "node-" + n.id });
    box.style.borderLeftColor = cat.color;
    box.appendChild(el("div", { class: "nlabel" }, n.label));
    if (n.path) box.appendChild(el("div", { class: "npath" }, n.path));
    if (n.detail) box.appendChild(el("div", { class: "ndetail" }, n.detail));
    col.appendChild(box);
    nodeEls[n.id] = box;
  });
  board.appendChild(col);
});

// ---- connector drawing ----
let activeFlow = null;

function anchorPoints(aEl, bEl) {
  // anchor on each box border facing the other box, in board-local coords
  const board = document.getElementById("board");
  const br = board.getBoundingClientRect();
  const a = aEl.getBoundingClientRect();
  const b = bEl.getBoundingClientRect();
  const ax = a.left - br.left, ay = a.top - br.top;
  const bx = b.left - br.left, by = b.top - br.top;
  const acx = ax + a.width/2, acy = ay + a.height/2;
  const bcx = bx + b.width/2, bcy = by + b.height/2;
  // pick left/right border based on horizontal relation
  let p1, p2;
  if (bcx >= acx) { p1 = { x: ax + a.width, y: acy }; p2 = { x: bx, y: bcy }; }
  else            { p1 = { x: ax, y: acy };           p2 = { x: bx + b.width, y: bcy }; }
  return { p1, p2 };
}

function ensureArrowDefs() {
  let defs = overlay.querySelector("defs");
  if (defs) return;
  defs = svg("defs");
  const mk = (id, color) => {
    const mk = svg("marker", { id, markerWidth: "9", markerHeight: "9", refX: "7", refY: "3", orient: "auto", markerUnits: "userSpaceOnUse" });
    const p = svg("path", { d: "M0,0 L7,3 L0,6 Z", fill: color });
    mk.appendChild(p); return mk;
  };
  // One arrowhead per category colour, so each connector's head matches its source.
  DATA.categories.forEach(c => defs.appendChild(mk("arrow-" + c.id, c.color)));
  defs.appendChild(mk("arrow-faint", "#2c3a4f"));
  overlay.appendChild(defs);
}

function drawFaintEdges() {
  DATA.edges.forEach(e => {
    const a = nodeEls[e.from], b = nodeEls[e.to];
    if (!a || !b) return;
    const { p1, p2 } = anchorPoints(a, b);
    const path = svg("path", {
      d: "M" + p1.x + "," + p1.y + " L" + p2.x + "," + p2.y,
      stroke: "#2c3a4f", "stroke-width": "1.4", fill: "none",
      "marker-end": "url(#arrow-faint)", opacity: ".55"
    });
    overlay.appendChild(path);
  });
}

function curveBetween(p1, p2, offset) {
  // quadratic curve; offset bends the midpoint perpendicular to the segment
  const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
  const dx = p2.x - p1.x, dy = p2.y - p1.y;
  const len = Math.hypot(dx, dy) || 1;
  const nx = -dy / len, ny = dx / len;
  const cx = mx + nx * offset, cy = my + ny * offset;
  // point on the quadratic at t=0.5 for the badge
  const bx = 0.25*p1.x + 0.5*cx + 0.25*p2.x;
  const by = 0.25*p1.y + 0.5*cy + 0.25*p2.y;
  return { d: "M" + p1.x + "," + p1.y + " Q" + cx + "," + cy + " " + p2.x + "," + p2.y, bx, by };
}

function drawFlow(flow) {
  // count duplicate pairs to offset parallel steps
  const pairSeen = {};
  const pairTotal = {};
  flow.steps.forEach(s => { const k = s.from + ">" + s.to; pairTotal[k] = (pairTotal[k]||0) + 1; });

  flow.steps.forEach((s, i) => {
    const a = nodeEls[s.from], b = nodeEls[s.to];
    if (!a || !b) return;
    const { p1, p2 } = anchorPoints(a, b);
    const k = s.from + ">" + s.to;
    const idx = (pairSeen[k] = (pairSeen[k]||0) + 1) - 1;
    const total = pairTotal[k];
    // base curvature so even single edges bow slightly; spread duplicates
    let offset;
    if (total === 1) {
      offset = (Math.abs(p2.x - p1.x) < 4) ? 26 : 0; // bow vertical same-column links
    } else {
      const spread = 34;
      offset = (idx - (total - 1) / 2) * spread * 2;
      if (offset === 0) offset = 0.001;
    }
    const { d, bx, by } = curveBetween(p1, p2, offset);
    // Colour the step by its SOURCE node's category — "who is acting".
    const srcCat = nodeById[s.from] ? nodeById[s.from].category : null;
    const color = catColor(s.from);
    const path = svg("path", {
      d, stroke: color, "stroke-width": "2.4", fill: "none",
      "marker-end": "url(#arrow-" + (srcCat || "faint") + ")", "stroke-linecap": "round",
      filter: "drop-shadow(0 0 4px " + color + "66)"
    });
    overlay.appendChild(path);
    // badge with step number
    const g = svg("g");
    g.appendChild(svg("circle", { cx: bx, cy: by, r: "11", fill: color, stroke: "#0b0f17", "stroke-width": "2" }));
    const t = svg("text", { x: bx, y: by + 4, "text-anchor": "middle", "font-size": "12", "font-weight": "800", fill: "#0b0f17" });
    t.textContent = String(i + 1);
    g.appendChild(t);
    overlay.appendChild(g);
  });
}

function sizeOverlay() {
  const board = document.getElementById("board");
  overlay.setAttribute("width", board.scrollWidth);
  overlay.setAttribute("height", board.scrollHeight);
  overlay.setAttribute("viewBox", "0 0 " + board.scrollWidth + " " + board.scrollHeight);
}

function redraw() {
  while (overlay.firstChild) overlay.removeChild(overlay.firstChild);
  sizeOverlay();
  ensureArrowDefs();
  if (activeFlow) drawFlow(activeFlow);
  else drawFaintEdges();
}

// ---- selection ----
function selectFlow(flow) {
  activeFlow = flow;
  document.body.classList.add("flow-active");
  // node highlight + ordering badges
  const order = {};
  flow.steps.forEach((s, i) => { if (!(s.from in order)) order[s.from] = i + 1; });
  // assign each node a first-touch step number (from-side)
  Object.values(nodeEls).forEach(b => { b.classList.remove("in-flow", "badge"); b.removeAttribute("data-badge"); });
  const touched = new Set();
  flow.steps.forEach(s => { touched.add(s.from); touched.add(s.to); });
  touched.forEach(id => { if (nodeEls[id]) nodeEls[id].classList.add("in-flow"); });

  // flow list active state
  document.querySelectorAll(".flow").forEach(f => f.classList.toggle("active", f.dataset.id === flow.id));

  // steps panel
  const host = document.getElementById("steps-host");
  const ol = document.getElementById("steps");
  while (ol.firstChild) ol.removeChild(ol.firstChild);
  flow.steps.forEach((s, i) => {
    const li = el("li");
    const num = el("span", { class: "stepnum" }, String(i + 1));
    num.style.background = catColor(s.from);
    num.style.color = "#0b0f17";
    li.appendChild(num);
    const tx = el("div", { class: "steptext" });
    const route = el("div", { class: "route" });
    const fromB = el("b", null, nodeById[s.from] ? nodeById[s.from].label : s.from);
    const toB = el("b", null, nodeById[s.to] ? nodeById[s.to].label : s.to);
    route.appendChild(fromB); route.appendChild(document.createTextNode(" → ")); route.appendChild(toB);
    tx.appendChild(route);
    tx.appendChild(el("div", { class: "lbl" }, s.label || ""));
    if (s.detail) tx.appendChild(el("div", { class: "det" }, s.detail));
    li.appendChild(tx);
    ol.appendChild(li);
  });
  host.style.display = "flex";
  redraw();
}

function clearSelection() {
  activeFlow = null;
  document.body.classList.remove("flow-active");
  Object.values(nodeEls).forEach(b => { b.classList.remove("in-flow", "badge"); b.removeAttribute("data-badge"); });
  document.querySelectorAll(".flow").forEach(f => f.classList.remove("active"));
  document.getElementById("steps-host").style.display = "none";
  redraw();
}

// ---- flows list ----
const flowsHost = document.getElementById("flows");
DATA.flows.forEach(flow => {
  const f = el("div", { class: "flow" });
  f.dataset.id = flow.id;
  f.appendChild(el("div", { class: "name" }, flow.name));
  if (flow.description) f.appendChild(el("div", { class: "fdesc" }, flow.description));
  f.addEventListener("click", () => selectFlow(flow));
  flowsHost.appendChild(f);
});
document.getElementById("reset").addEventListener("click", clearSelection);

// ---- redraw triggers ----
window.addEventListener("resize", redraw);
document.getElementById("canvas").addEventListener("scroll", redraw);
window.addEventListener("load", () => requestAnimationFrame(redraw));

// default selection (Stage 3): checkout
const DEFAULT_FLOW = "checkout";
const def = DATA.flows.find(f => f.id === DEFAULT_FLOW) || DATA.flows[0];
requestAnimationFrame(() => { if (def) selectFlow(def); else redraw(); });
}

(async () => {
  try {
    const res = await fetch('data.json');
    DATA = await res.json();
    init();
  } catch (e) {
    console.error('Failed to load data.json:', e);
  }
})();
</script>
</body>
</html>
